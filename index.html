<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>异动剩余涨停计算器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #1e293b;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 28px;
      background: linear-gradient(135deg, #0f766e, #059669);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 搜索区域 */
    .search-wrap {
      position: relative;
      margin-bottom: 28px;
    }
    .search-input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: all 0.25s ease;
      background: #f8fafc;
    }
    .search-input:focus {
      border-color: #059669;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(5,150,105,0.1);
    }
    .suggest-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-top: 6px;
      max-height: 280px;
      overflow-y: auto;
      z-index: 99;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .suggest-list.show { display: block; }
    .suggest-item {
      padding: 12px 18px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.15s;
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover { background: #f0fdf4; }
    .suggest-name { font-weight: 500; }
    .suggest-code { color: #64748b; font-size: 14px; }

    .query-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 8px;
    }
    .query-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16,185,129,0.3); }
    .query-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    /* 结果卡片 */
    .result-card {
      display: none;
      background: #f8fafc;
      border-radius: 16px;
      padding: 24px;
    }
    .result-card.show { display: block; }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 14px;
      padding-left: 8px;
      border-left: 3px solid #059669;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 9px 0;
      font-size: 15px;
    }
    .info-label { color: #64748b; }
    .info-value { font-weight: 500; }
    .highlight-row .info-value {
      font-size: 17px;
      color: #dc2626;
      font-weight: 700;
    }
    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 16px 0;
    }

    .tip {
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      margin-top: 20px;
      line-height: 1.6;
    }
    .error-msg {
      color: #dc2626;
      text-align: center;
      padding: 24px 0;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      body { padding: 20px 12px; }
      .card { padding: 28px 20px; }
      .title { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="title">异动剩余涨停计算器</div>

      <div class="search-wrap">
        <input 
          id="stockInput" 
          class="search-input"
          type="text" 
          placeholder="输入股票代码 / 名称 / 拼音首字母" 
          autocomplete="off"
        />
        <div id="suggestList" class="suggest-list"></div>
      </div>

      <button id="queryBtn" class="query-btn" onclick="handleQuery()">查询</button>

      <div id="resultCard" class="result-card">
        <div class="section-title">基础信息</div>
        <div class="info-row">
          <span class="info-label">所属板块</span>
          <span class="info-value" id="board">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">单日涨停幅度</span>
          <span class="info-value" id="limitRate">-</span>
        </div>

        <div class="divider"></div>
        <div class="section-title">累计偏离异动</div>
        <div class="info-row">
          <span class="info-label">10日累计偏离值</span>
          <span class="info-value" id="dev10">-</span>
        </div>
        <div class="info-row highlight-row">
          <span class="info-label">距10天100%异动</span>
          <span class="info-value" id="left10">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">30日累计偏离值</span>
          <span class="info-value" id="dev30">-</span>
        </div>
        <div class="info-row highlight-row">
          <span class="info-label">距30天200%异动</span>
          <span class="info-value" id="left30">-</span>
        </div>

        <div class="divider"></div>
        <div class="section-title">同向异动次数</div>
        <div class="info-row">
          <span class="info-label">近10日已触发异动</span>
          <span class="info-value" id="anomalyCount">-</span>
        </div>
        <div class="info-row highlight-row">
          <span class="info-label">距严重异动阈值</span>
          <span class="info-value" id="anomalyLeft">-</span>
        </div>

        <div class="tip">
          * 所有结果均为估算值，默认假设指数不涨<br>
          * 同向异动按3日累计偏离值滑动计算，与官方公告可能有差异<br>
          * 仅供参考，不构成任何投资建议
        </div>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>
    </div>
  </div>

  <script>
    // ========== 固定配置参数 ==========
    const THRESHOLD_10D = 100.0;   // 10日偏离阈值 %
    const THRESHOLD_30D = 200.0;   // 30日偏离阈值 %
    const INDEX_EXPECTED_PCT = 0;  // 预期指数每日涨幅 %
    // =================================

    const input = document.getElementById('stockInput');
    const btn = document.getElementById('queryBtn');
    const resultCard = document.getElementById('resultCard');
    const errorMsg = document.getElementById('errorMsg');
    const suggestList = document.getElementById('suggestList');

    let searchTimer = null;
    let currentStockCode = '';

    // 回车查询
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        hideSuggest();
        handleQuery();
      }
    });

    // 输入联想搜索
    input.addEventListener('input', e => {
      const val = e.target.value.trim();
      clearTimeout(searchTimer);
      if (val.length < 1) {
        hideSuggest();
        return;
      }
      searchTimer = setTimeout(() => fetchSuggest(val), 300);
    });

    // 点击外部关闭下拉
    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) hideSuggest();
    });

    // 搜索联想（东方财富原生接口，支持拼音/汉字/代码）
    function fetchSuggest(keyword) {
      const url = `https://suggest.eastmoney.com/SuggestData/Default.aspx?input=${encodeURIComponent(keyword)}&type=14`;
      jsonpRequest(url, 'cb').then(data => {
        if (!data || !data.length) {
          hideSuggest();
          return;
        }
        renderSuggest(data.slice(0, 8));
      }).catch(() => hideSuggest());
    }

    function renderSuggest(list) {
      let html = '';
      list.forEach(item => {
        // 格式：代码,名称,拼音首字母,...
        const parts = item.split(',');
        if (parts.length < 3) return;
        const code = parts[1];
        const name = parts[2];
        html += `
          <div class="suggest-item" onclick="selectStock('${code}','${name}')">
            <span class="suggest-name">${name}</span>
            <span class="suggest-code">${code}</span>
          </div>
        `;
      });
      suggestList.innerHTML = html;
      suggestList.classList.add('show');
    }

    function selectStock(code, name) {
      input.value = name + ' (' + code + ')';
      currentStockCode = code;
      hideSuggest();
      handleQuery();
    }

    function hideSuggest() {
      suggestList.classList.remove('show');
    }

    // 6位代码转东方财富secid格式
    function formatEastmoneyCode(code) {
      code = code.trim();
      if (!/^\d{6}$/.test(code)) return null;
      if (code.startsWith('6') || code.startsWith('9')) return `1.${code}`;
      if (code.startsWith('0') || code.startsWith('3')) return `0.${code}`;
      return null;
    }

    // 板块信息与异动阈值
    function getBoardInfo(stockCode) {
      if (stockCode.startsWith('688')) {
        return {
          board: '科创板',
          indexCode: '1.000688',
          limitRate: 0.20,
          anomaly3d: 30,    // 3日同向异动阈值 %
          anomaly10dMax: 3  // 10日严重异动次数
        };
      } else if (stockCode.startsWith('30')) {
        return {
          board: '创业板',
          indexCode: '0.399102',
          limitRate: 0.20,
          anomaly3d: 30,
          anomaly10dMax: 3
        };
      } else if (stockCode.startsWith('60') || stockCode.startsWith('605')) {
        return {
          board: '沪市主板',
          indexCode: '1.000001',
          limitRate: 0.10,
          anomaly3d: 20,
          anomaly10dMax: 4
        };
      } else if (['00','001','002','003'].some(p => stockCode.startsWith(p))) {
        return {
          board: '深市主板',
          indexCode: '0.399107',
          limitRate: 0.10,
          anomaly3d: 20,
          anomaly10dMax: 4
        };
      } else {
        return {
          board: '其他板块',
          indexCode: '1.000001',
          limitRate: 0.10,
          anomaly3d: 20,
          anomaly10dMax: 4
        };
      }
    }

    // JSONP通用封装
    function jsonpRequest(url, cbParam = 'cb') {
      return new Promise((resolve, reject) => {
        const callbackName = 'cb_' + Date.now() + Math.random().toString(36).slice(2, 6);
        const script = document.createElement('script');
        
        window[callbackName] = function(data) {
          resolve(data);
          document.body.removeChild(script);
          delete window[callbackName];
        };

        script.src = url + `&${cbParam}=${callbackName}`;
        script.onerror = () => {
          reject(new Error('请求失败'));
          document.body.removeChild(script);
          delete window[callbackName];
        };
        document.body.appendChild(script);
      });
    }

    // 获取日K线收盘价
    async function getKline(secid, days) {
      const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&fields1=f1,f2,f3&fields2=f51,f52,f53,f54,f55&klt=101&fqt=0&end=20500101&lmt=${days}`;
      try {
        const json = await jsonpRequest(url, 'cb');
        if (!json || !json.data || !json.data.klines || json.data.klines.length < days) {
          return null;
        }
        return json.data.klines.map(item => parseFloat(item.split(',')[2]));
      } catch (e) {
        console.error('行情获取失败:', e);
        return null;
      }
    }

    // 计算每日涨跌幅列表 %
    function calcPctList(closes) {
      const pctList = [];
      for (let i = 1; i < closes.length; i++) {
        const pct = ((closes[i] - closes[i-1]) / closes[i-1]) * 100;
        pctList.push(pct);
      }
      return pctList;
    }

    // 计算近10天内同向异动次数（3日累计偏离滑动窗口）
    function calcAnomalyCount(devList, threshold3d) {
      let count = 0;
      // 取最近10个交易日的偏离值，滑动计算每连续3天的累计
      const recent10 = devList.slice(-10);
      for (let i = 0; i <= recent10.length - 3; i++) {
        const sum3 = recent10[i] + recent10[i+1] + recent10[i+2];
        if (sum3 >= threshold3d) count++;
      }
      return count;
    }

    // 主查询函数
    async function handleQuery() {
      // 提取6位代码
      let code = currentStockCode || input.value.trim();
      const match = code.match(/\d{6}/);
      if (match) code = match[0];

      resultCard.classList.remove('show');
      errorMsg.style.display = 'none';

      if (!/^\d{6}$/.test(code)) {
        showError('请输入有效的6位数字股票代码');
        return;
      }

      btn.disabled = true;
      btn.textContent = '查询中...';

      try {
        const { board, indexCode, limitRate, anomaly3d, anomaly10dMax } = getBoardInfo(code);
        const stockSecid = formatEastmoneyCode(code);

        // 取33天K线，保证有32个涨跌幅，覆盖30日+同向异动计算
        const [stockCloses, indexCloses] = await Promise.all([
          getKline(stockSecid, 33),
          getKline(indexCode, 33)
        ]);

        if (!stockCloses || !indexCloses) {
          showError('行情数据获取失败，请稍后重试');
          return;
        }

        const stockPct = calcPctList(stockCloses);
        const indexPct = calcPctList(indexCloses);
        const devList = stockPct.map((s, i) => s - indexPct[i]);

        // 1. 累计偏离值计算
        const dev10d = devList.slice(-10).reduce((a,b) => a+b, 0);
        const dev30d = devList.slice(-30).reduce((a,b) => a+b, 0);

        const perLimitDev = limitRate * 100 - INDEX_EXPECTED_PCT;
        const remaining10 = THRESHOLD_10D - dev10d;
        const limitCount10 = remaining10 > 0 ? remaining10 / perLimitDev : 0;
        const remaining30 = THRESHOLD_30D - dev30d;
        const limitCount30 = remaining30 > 0 ? remaining30 / perLimitDev : 0;

        // 2. 同向异动次数计算
        const anomalyCount = calcAnomalyCount(devList, anomaly3d);
        const anomalyLeft = Math.max(0, anomaly10dMax - anomalyCount);
        // 单次异动约需2个涨停（3日累计20%≈2个10%涨停）
        const anomalyLimitLeft = anomalyLeft * 2;

        // 渲染结果
        document.getElementById('board').textContent = board;
        document.getElementById('limitRate').textContent = `${Math.round(limitRate * 100)}%`;
        document.getElementById('dev10').textContent = dev10d.toFixed(2) + '%';
        document.getElementById('left10').textContent = `还剩 ${Math.max(0, limitCount10).toFixed(2)} 个涨停`;
        document.getElementById('dev30').textContent = dev30d.toFixed(2) + '%';
        document.getElementById('left30').textContent = `还剩 ${Math.max(0, limitCount30).toFixed(2)} 个涨停`;
        document.getElementById('anomalyCount').textContent = `${anomalyCount} 次`;
        document.getElementById('anomalyLeft').textContent = `还差 ${anomalyLeft} 次 ≈ ${anomalyLimitLeft} 个涨停`;

        resultCard.classList.add('show');
      } catch (e) {
        showError('查询出错，请稍后重试');
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.textContent = '查询';
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
  </script>
</body>
</html>

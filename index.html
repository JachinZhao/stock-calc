<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>异动剩余涨停计算器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh;
      padding: 30px 20px;
      color: #1e293b;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #0f766e, #059669);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 搜索区域 */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: all 0.25s ease;
      background: #f8fafc;
    }
    .search-input:focus {
      border-color: #059669;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(5,150,105,0.1);
    }
    .suggest-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-top: 6px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 99;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .suggest-list.show { display: block; }
    .suggest-item {
      padding: 10px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.15s;
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover { background: #f0fdf4; }
    .suggest-name { font-weight: 500; }
    .suggest-code { color: #64748b; font-size: 13px; }

    .query-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 16px;
    }
    .query-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16,185,129,0.3); }
    .query-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    /* 结果区域 - 左右两栏布局 */
    .result-card {
      display: none;
      gap: 20px;
    }
    .result-card.show { display: flex; }
    .col-left {
      flex: 0 0 38%;
      background: #f8fafc;
      border-radius: 12px;
      padding: 18px;
    }
    .col-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .section {
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px 18px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 12px;
      padding-left: 6px;
      border-left: 3px solid #059669;
    }
    .stock-name {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }
    .stock-code {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 16px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
    }
    .info-label { color: #64748b; }
    .info-value { font-weight: 500; }
    .highlight-row .info-value {
      font-size: 15px;
      color: #dc2626;
      font-weight: 700;
    }
    .sub-row .info-value {
      font-size: 13px;
      color: #475569;
    }
    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 10px 0;
    }

    .tip {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }
    .error-msg {
      color: #dc2626;
      text-align: center;
      padding: 20px 0;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      body { padding: 16px 10px; }
      .card { padding: 20px 16px; }
      .result-card { flex-direction: column; gap: 12px; }
      .col-left { flex: none; }
      .stock-name { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="title">异动剩余涨停计算器</div>

      <div class="search-wrap">
        <input 
          id="stockInput" 
          class="search-input"
          type="text" 
          placeholder="输入股票代码 / 名称 / 拼音首字母（如 fhgk）" 
          autocomplete="off"
        />
        <div id="suggestList" class="suggest-list"></div>
      </div>

      <button id="queryBtn" class="query-btn" onclick="handleQuery()">查询</button>

      <div id="resultCard" class="result-card">
        <!-- 左侧：基础信息 -->
        <div class="col-left">
          <div class="stock-name" id="stockName">-</div>
          <div class="stock-code" id="stockCode">-</div>
          <div class="info-row">
            <span class="info-label">所属板块</span>
            <span class="info-value" id="board">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">涨停幅度</span>
            <span class="info-value" id="limitRate">-</span>
          </div>
        </div>

        <!-- 右侧：异动数据 -->
        <div class="col-right">
          <div class="section">
            <div class="section-title">累计偏离异动</div>
            <div class="info-row">
              <span class="info-label">10日累计偏离</span>
              <span class="info-value" id="dev10">-</span>
            </div>
            <div class="info-row highlight-row">
              <span class="info-label">距10天100%异动</span>
              <span class="info-value" id="left10">-</span>
            </div>
            <div class="info-row sub-row">
              <span class="info-label">次日触发需涨</span>
              <span class="info-value" id="nextDay10">-</span>
            </div>
            <div class="divider"></div>
            <div class="info-row">
              <span class="info-label">30日累计偏离</span>
              <span class="info-value" id="dev30">-</span>
            </div>
            <div class="info-row highlight-row">
              <span class="info-label">距30天200%异动</span>
              <span class="info-value" id="left30">-</span>
            </div>
            <div class="info-row sub-row">
              <span class="info-label">次日触发需涨</span>
              <span class="info-value" id="nextDay30">-</span>
            </div>
          </div>

          <div class="section">
            <div class="section-title">同向异动次数</div>
            <div class="info-row">
              <span class="info-label">近10日已触发</span>
              <span class="info-value" id="anomalyCount">-</span>
            </div>
            <div class="info-row highlight-row">
              <span class="info-label">距严重异动阈值</span>
              <span class="info-value" id="anomalyLeft">-</span>
            </div>
          </div>
        </div>
      </div>

      <div class="tip">
        * 偏离值按区间涨跌幅差值计算，默认假设指数不涨<br>
        * 剩余涨停按滚动窗口逐日模拟，与官方公告可能存在差异<br>
        * 仅供参考，不构成任何投资建议
      </div>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>
    </div>
  </div>

  <script>
    // ========== 固定配置参数 ==========
    const THRESHOLD_10D = 100.0;   // 10日偏离阈值 %
    const THRESHOLD_30D = 200.0;   // 30日偏离阈值 %
    const INDEX_EXPECTED_PCT = 0;  // 预期指数每日涨幅 %
    // 免费CORS代理（搜索接口用）
    const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
    // =================================

    const input = document.getElementById('stockInput');
    const btn = document.getElementById('queryBtn');
    const resultCard = document.getElementById('resultCard');
    const errorMsg = document.getElementById('errorMsg');
    const suggestList = document.getElementById('suggestList');

    let searchTimer = null;
    let currentStock = { code: '', name: '' };

    // 回车查询
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        hideSuggest();
        handleQuery();
      }
    });

    // 输入联想搜索
    input.addEventListener('input', e => {
      const val = e.target.value.trim();
      clearTimeout(searchTimer);
      if (val.length < 1) {
        hideSuggest();
        return;
      }
      searchTimer = setTimeout(() => fetchSuggest(val), 300);
    });

    // 点击外部关闭下拉
    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) hideSuggest();
    });

    // 东方财富搜索接口（CORS代理方式，失败静默处理）
    async function fetchSuggest(keyword) {
      const targetUrl = `https://suggest.eastmoney.com/SuggestData/Default.aspx?input=${encodeURIComponent(keyword)}&type=14`;
      try {
        const res = await fetch(CORS_PROXY + encodeURIComponent(targetUrl));
        if (!res.ok) throw new Error('代理请求失败');
        const text = await res.text();
        const match = text.match(/var str\s*=\s*(\[.*?\]);?/s);
        if (!match) {
          hideSuggest();
          return;
        }
        const list = JSON.parse(match[1]);
        const stocks = [];
        list.forEach(item => {
          const parts = item.split(',');
          if (parts.length < 3) return;
          const code = parts[1];
          const name = parts[2];
          if (/^\d{6}$/.test(code)) {
            stocks.push({ code, name });
          }
        });
        renderSuggest(stocks.slice(0, 8));
      } catch (e) {
        hideSuggest();
      }
    }

    function renderSuggest(list) {
      if (!list.length) {
        hideSuggest();
        return;
      }
      let html = '';
      list.forEach(item => {
        html += `
          <div class="suggest-item" onclick="selectStock('${item.code}','${item.name}')">
            <span class="suggest-name">${item.name}</span>
            <span class="suggest-code">${item.code}</span>
          </div>
        `;
      });
      suggestList.innerHTML = html;
      suggestList.classList.add('show');
    }

    function selectStock(code, name) {
      input.value = `${name} (${code})`;
      currentStock = { code, name };
      hideSuggest();
      handleQuery();
    }

    function hideSuggest() {
      suggestList.classList.remove('show');
    }

    // 6位代码转东方财富secid格式
    function formatEastmoneyCode(code) {
      code = code.trim();
      if (!/^\d{6}$/.test(code)) return null;
      if (code.startsWith('6') || code.startsWith('9')) return `1.${code}`;
      if (code.startsWith('0') || code.startsWith('3')) return `0.${code}`;
      return null;
    }

    // 板块信息与异动阈值
    function getBoardInfo(stockCode) {
      if (stockCode.startsWith('688')) {
        return {
          board: '科创板',
          indexCode: '1.000688',
          limitRate: 0.20,
          anomaly3d: 30,
          anomaly10dMax: 3
        };
      } else if (stockCode.startsWith('30')) {
        return {
          board: '创业板',
          indexCode: '0.399102',
          limitRate: 0.20,
          anomaly3d: 30,
          anomaly10dMax: 3
        };
      } else if (stockCode.startsWith('6')) {
        return {
          board: '沪市主板',
          indexCode: '1.000001',
          limitRate: 0.10,
          anomaly3d: 20,
          anomaly10dMax: 4
        };
      } else if (['00','001','002','003'].some(p => stockCode.startsWith(p))) {
        return {
          board: '深市主板',
          indexCode: '0.399107',
          limitRate: 0.10,
          anomaly3d: 20,
          anomaly10dMax: 4
        };
      } else {
        return {
          board: '其他板块',
          indexCode: '1.000001',
          limitRate: 0.10,
          anomaly3d: 20,
          anomaly10dMax: 4
        };
      }
    }

    // JSONP通用封装（K线接口使用，原生稳定）
    function jsonpRequest(url, cbParam = 'cb') {
      return new Promise((resolve, reject) => {
        const callbackName = 'cb_' + Date.now() + Math.random().toString(36).slice(2, 6);
        const script = document.createElement('script');
        
        window[callbackName] = function(data) {
          resolve(data);
          document.body.removeChild(script);
          delete window[callbackName];
        };

        script.src = url + `&${cbParam}=${callbackName}`;
        script.onerror = () => {
          reject(new Error('请求失败'));
          document.body.removeChild(script);
          delete window[callbackName];
        };
        document.body.appendChild(script);
      });
    }

    // 获取日K线收盘价 + 股票名称（正序：旧→新）
    async function getKline(secid, days) {
      const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&fields1=f1,f2,f3&fields2=f51,f52,f53,f54,f55&klt=101&fqt=0&end=20500101&lmt=${days}`;
      try {
        const json = await jsonpRequest(url, 'cb');
        if (!json || !json.data || !json.data.klines || json.data.klines.length < days) {
          return null;
        }
        const closes = json.data.klines.map(item => parseFloat(item.split(',')[2]));
        return {
          closes: closes,
          name: json.data.name || ''
        };
      } catch (e) {
        console.error('行情获取失败:', e);
        return null;
      }
    }

    // 计算区间涨跌幅（%）：days个交易日区间
    function calcRangePct(closes, days) {
      const len = closes.length;
      if (len <= days) return null;
      const end = closes[len - 1];
      const start = closes[len - 1 - days];
      return ((end / start) - 1) * 100;
    }

    // 计算次日触发所需涨幅（滚动窗口，假设指数不涨）
    function calcNextDayTrigger(closes, indexCloses, days, threshold) {
      const len = closes.length;
      // 滚动后窗口起点后移一位
      const startAfterRoll = closes[len - days];
      const indexStartAfterRoll = indexCloses[len - days];
      const currentEnd = closes[len - 1];
      const indexCurrentEnd = indexCloses[len - 1];

      // 指数次日不涨
      const indexRangeAfter = (indexCurrentEnd / indexStartAfterRoll) - 1;
      // 目标个股区间涨幅
      const targetStockRange = (threshold / 100) + indexRangeAfter;
      // 反推次日收盘价
      const targetEndPrice = startAfterRoll * (1 + targetStockRange);
      // 次日涨幅
      const nextDayPct = ((targetEndPrice / currentEnd) - 1) * 100;
      
      return Math.max(0, nextDayPct);
    }

    // 计算剩余涨停数（滚动窗口模拟，支持小数）
    function calcLimitDays(closes, indexCloses, days, threshold, limitRate) {
      let stockPrices = [...closes];
      let indexPrices = [...indexCloses];
      const limitFactor = 1 + limitRate;
      let fullDays = 0;

      // 先算完整涨停天数
      while (fullDays < 30) {
        const stockPct = calcRangePct(stockPrices, days);
        const indexPct = calcRangePct(indexPrices, days);
        const dev = stockPct - indexPct;
        if (dev >= threshold) break;
        
        // 模拟一个完整涨停，指数不涨
        const lastStock = stockPrices[stockPrices.length - 1];
        const lastIndex = indexPrices[indexPrices.length - 1];
        stockPrices.push(lastStock * limitFactor);
        indexPrices.push(lastIndex);
        fullDays++;
      }

      // 如果刚好多天涨停刚好触发，直接返回
      const finalDev = calcRangePct(stockPrices, days) - calcRangePct(indexPrices, days);
      if (finalDev >= threshold && fullDays === 0) return 0;

      // 计算最后一天需要的比例（小数部分）
      if (finalDev >= threshold) {
        // 回退最后一个涨停，计算需要多少比例
        stockPrices.pop();
        indexPrices.pop();
        
        const len = stockPrices.length;
        const startPrice = stockPrices[len - days];
        const indexStartPrice = indexPrices[len - days];
        const currentPrice = stockPrices[len - 1];
        const currentIndex = indexPrices[len - 1];

        const indexRange = (currentIndex / indexStartPrice) - 1;
        const targetStockRange = (threshold / 100) + indexRange;
        const targetPrice = startPrice * (1 + targetStockRange);
        const neededPct = ((targetPrice / currentPrice) - 1) * 100;
        const fraction = neededPct / (limitRate * 100);
        
        return +(fullDays - 1 + fraction).toFixed(1);
      }

      return +fullDays.toFixed(1);
    }

    // 计算近10天内同向异动次数（3日区间偏离滑动窗口）
    function calcAnomalyCount(closes, indexCloses, threshold3d) {
      const len = closes.length;
      const startIdx = Math.max(0, len - 13);
      let count = 0;
      for (let i = startIdx; i <= len - 3; i++) {
        const stockPct = ((closes[i+2] / closes[i]) - 1) * 100;
        const indexPct = ((indexCloses[i+2] / indexCloses[i]) - 1) * 100;
        const dev3d = stockPct - indexPct;
        if (dev3d >= threshold3d) count++;
      }
      return count;
    }

    // 主查询函数
    async function handleQuery() {
      // 提取6位代码
      let code = currentStock.code || input.value.trim();
      const match = input.value.match(/(\d{6})/);
      if (match) code = match[0];

      resultCard.classList.remove('show');
      errorMsg.style.display = 'none';

      if (!/^\d{6}$/.test(code)) {
        showError('请输入有效的6位数字股票代码，或从搜索列表中选择');
        return;
      }

      btn.disabled = true;
      btn.textContent = '查询中...';

      try {
        const { board, indexCode, limitRate, anomaly3d, anomaly10dMax } = getBoardInfo(code);
        const stockSecid = formatEastmoneyCode(code);
        const perLimitDev = limitRate * 100;

        // 获取35根K线，覆盖30日区间和滚动计算
        const [stockRes, indexRes] = await Promise.all([
          getKline(stockSecid, 35),
          getKline(indexCode, 35)
        ]);

        if (!stockRes || !indexRes) {
          showError('行情数据获取失败，请稍后重试');
          return;
        }

        const stockCloses = stockRes.closes;
        const indexCloses = indexRes.closes;
        const stockName = stockRes.name || code;

        // 1. 当前区间偏离值
        const dev10d = calcRangePct(stockCloses, 10) - calcRangePct(indexCloses, 10);
        const dev30d = calcRangePct(stockCloses, 30) - calcRangePct(indexCloses, 30);

        // 2. 次日触发所需涨幅
        const nextDay10 = calcNextDayTrigger(stockCloses, indexCloses, 10, THRESHOLD_10D);
        const nextDay30 = calcNextDayTrigger(stockCloses, indexCloses, 30, THRESHOLD_30D);

        // 3. 剩余涨停数（滚动窗口模拟，1位小数）
        const leftDays10 = calcLimitDays(stockCloses, indexCloses, 10, THRESHOLD_10D, limitRate);
        const leftDays30 = calcLimitDays(stockCloses, indexCloses, 30, THRESHOLD_30D, limitRate);

        // 4. 同向异动次数 + 对应涨停估算
        const anomalyCount = calcAnomalyCount(stockCloses, indexCloses, anomaly3d);
        const anomalyLeft = Math.max(0, anomaly10dMax - anomalyCount);
        const anomalyLimitLeft = (anomalyLeft * anomaly3d / perLimitDev).toFixed(1);

        // 渲染结果
        document.getElementById('stockName').textContent = stockName;
        document.getElementById('stockCode').textContent = code;
        document.getElementById('board').textContent = board;
        document.getElementById('limitRate').textContent = `${Math.round(limitRate * 100)}%`;
        
        document.getElementById('dev10').textContent = dev10d.toFixed(2) + '%';
        document.getElementById('left10').textContent = `还剩 ${leftDays10} 个涨停`;
        document.getElementById('nextDay10').textContent = nextDay10 <= 0 ? '已触发' : `≥ ${nextDay10.toFixed(2)}%`;
        
        document.getElementById('dev30').textContent = dev30d.toFixed(2) + '%';
        document.getElementById('left30').textContent = `还剩 ${leftDays30} 个涨停`;
        document.getElementById('nextDay30').textContent = nextDay30 <= 0 ? '已触发' : `≥ ${nextDay30.toFixed(2)}%`;
        
        document.getElementById('anomalyCount').textContent = `${anomalyCount} 次`;
        document.getElementById('anomalyLeft').textContent = `还差 ${anomalyLeft} 次 ≈ ${anomalyLimitLeft} 个涨停`;

        resultCard.classList.add('show');
      } catch (e) {
        showError('查询出错，请稍后重试');
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.textContent = '查询';
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
  </script>
</body>
</html>
